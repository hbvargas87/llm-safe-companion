# =============================================================================
# KID-SAFE LLM - Configuración de Fine-Tuning QLoRA
# Modelo: Qwen2-7B-Instruct
# Hardware: NVIDIA RTX 5080 (16GB VRAM)
# Técnica: QLoRA (4-bit quantization + Low-Rank Adaptation)
# =============================================================================

# --- Modelo Base ---
model:
  name_or_path: "Qwen/Qwen2-7B-Instruct"
  quantization_config:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
  trust_remote_code: true

# --- Dataset ---
dataset:
  # Ruta al dataset formateado para entrenamiento
  train_split: "train"
  # Formato de las columnas del dataset
  text_column: "text"
  # Columna para el template de conversación
  template: "qwen_instruct"

# --- Parámetros de Entrenamiento (SFT) ---
training:
  # Hyperparameters de QLoRA
  lora:
    r: 16                    # Rank de adaptación
    lora_alpha: 32           # Escala de LoRA
    lora_dropout: 0.05       # Dropout para regularización
    target_modules:          # Capas objetivo en Qwen2
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    task_type: "CAUSAL_LM"
  
  # Parámetros de entrenamiento
  output_dir: "./outputs/qwen2_7b_sft"
  num_train_epochs: 3
  per_device_train_batch_size: 2        # Batch por GPU (ajustar según VRAM)
  gradient_accumulation_steps: 8        # Acumulación para batch efectivo de 16
  learning_rate: 1.0e-4                 # Learning rate reducido para estabilidad (antes 2.0e-4)
  lr_scheduler_type: "cosine"           # Scheduler coseno
  warmup_ratio: 0.05                    # 5% warmup
  weight_decay: 0.01
  max_grad_norm: 0.5                    # Clip más agresivo para prevenir gradient explosion (antes 1.0)
  fp16: true                            # Mixed precision
  dataloader_num_workers: 4
  seed: 42
  
  # Optimización de memoria
  gradient_checkpointing: true          # Activar para reducir VRAM
  max_seq_length: 2048                  # Longitud máxima de secuencia
  
  # Logging y guardado
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  eval_steps: 100
  evaluation_strategy: "steps"

# --- Seguridad ---
security:
  # Filtro de contenido antes del entrenamiento
  content_filter:
    enabled: true
    # Palabras/claves a bloquear
    blocked_keywords:
      - "violencia_grave"
      - "contenido_sexual"
      - "drogas"
      - "odio"
    # Nivel de filtrado: "strict" (solo educativo) o "moderate" (algo de creatividad)
    level: "strict"
    age_appropriate: true
    min_age: 6
    max_age: 12

# --- Inferencia (Post-Entrenamiento) ---
inference:
  # Parámetros para generación
  generation:
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    repetition_penalty: 1.1
    do_sample: true
  
  # Filtro de seguridad en tiempo real
  real_time_filter:
    enabled: true
    model: "guardrails"
    # Modelo de detección de contenido inapropiado
    safety_model: "meta-llama/Llama-Guard-7b"

