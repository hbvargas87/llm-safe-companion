# =============================================================================
# KID-SAFE LLM - Configuración de DPO (Direct Preference Optimization)
# Modelo: Qwen2-7B-Instruct + LoRA (continúa del SFT)
# Hardware: NVIDIA RTX 5080 (16GB VRAM)
# =============================================================================

# --- Modelo Base ---
model:
  name_or_path: "Qwen/Qwen2-7B-Instruct"
  quantization_config:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
  trust_remote_code: true

# --- Parámetros de Entrenamiento (DPO) ---
training:
  # Hyperparameters de LoRA (mismos que SFT para compatibilidad)
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    task_type: "CAUSAL_LM"
  
  # Parámetros de entrenamiento
  output_dir: "./outputs/qwen2_7b_dpo"
  num_train_epochs: 3
  per_device_train_batch_size: 1        # DPO usa más VRAM (2 respuestas por sample)
  gradient_accumulation_steps: 8        # Batch efectivo: 8
  learning_rate: 5.0e-5                 # DPO necesita learning rate más bajo
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0                    # DPO es más estable, clip menos agresivo
  dataloader_num_workers: 4
  seed: 42
  
  # Optimización de memoria
  gradient_checkpointing: true
  max_prompt_length: 512                # Longitud máxima del prompt
  max_length: 1024                      # Longitud máxima total (prompt + respuesta)
  
  # Parámetros específicos de DPO
  dpo_beta: 0.1                         # Temperatura de la función de preferencia
                                          # 0.1 = fuerte preferencia por chosen
                                          # 1.0 = preferencia suave
                                          # Recomendado: 0.1-0.5
  
  # Logging y guardado
  logging_steps: 5                      # DPO tiene menos samples, loguear más seguido
  save_steps: 25
  save_total_limit: 3
  eval_strategy: "no"
