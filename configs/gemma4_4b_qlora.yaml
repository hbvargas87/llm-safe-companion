# =============================================================================
# GEMMA 4 E4B - Configuración de Fine-Tuning QLoRA con Unsloth
# Modelo: unsloth/gemma-4-E4B-it
# Hardware: NVIDIA RTX 5080 (16GB VRAM)
# Técnica: QLoRA 4-bit + Unsloth (60% menos VRAM, 1.5x más rápido)
# Basado en: https://unsloth.ai/docs/models/gemma-4/train (notebook oficial)
# =============================================================================

# --- Modelo Base ---
model:
  name_or_path: "unsloth/gemma-4-E4B-it"
  # Nota: Usar versión completa (no GGUF) para entrenamiento
  # GGUF es solo para inferencia: unsloth/gemma-4-E4B-it-qat-GGUF
  quantization_config:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
  trust_remote_code: true

# --- Chat Template ---
chat_template:
  # "gemma-4" = sin thinking mode (recomendado para niños)
  # "gemma-4-thinking" = con thinking mode (no recomendado para niños)
  template: "gemma-4"
  enable_thinking: false

# --- Dataset ---
dataset:
  train_split: "train"
  text_column: "text"
  format: "conversations"

# --- Parámetros de Entrenamiento (SFT) ---
training:
  # Hyperparameters de LoRA
  # Compromiso entre r=8 (conservador) y r=32 (notebook oficial)
  # r=16, alpha=16 ofrece buena calidad con VRAM manejable
  lora:
    r: 16                     # Rank de adaptación (compromiso: 8-32)
    lora_alpha: 16            # alpha == r recomendado por Unsloth
    lora_dropout: 0
    target_modules: "all-linear"  # Todas las capas lineales (notebook oficial)
    use_rslora: false         # Rank-Stabilized LoRA (opcional)
    loftq_config: null        # LoftQ (opcional)
    task_type: "CAUSAL_LM"
  
  # Capas a fine-tunear (solo texto, sin visión)
  finetune_vision_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

  # Parámetros de entrenamiento
  output_dir: "./outputs/gemma4_4b_sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4        # Optimizado: más throughput
  gradient_accumulation_steps: 4        # Batch efectivo: 4 x 4 = 16
  learning_rate: 2.0e-4                 # Learning rate (notebook oficial)
  lr_scheduler_type: "cosine"           # Scheduler coseno (notebook oficial)
  warmup_ratio: 0.03                    # 3% warmup (notebook oficial)
  weight_decay: 0.001
  max_grad_norm: 0.3                    # Gradient clipping (notebook oficial)
  bf16: true                            # Mixed precision (RTX 5080 soporta bf16 nativo)
  dataloader_num_workers: 2             # 2 workers para paralelismo ligero
  seed: 3407                            # Seed del notebook oficial
  # Optimización de memoria — CRÍTICO PARA VELOCIDAD
  gradient_checkpointing: false         # ❌ Desactivado: causa 30-50x más lento
  max_seq_length: 512                   # Reducido de 1024: 4x menos tokens por iter
  # Logging y guardado
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  eval_steps: 100
  evaluation_strategy: "steps"

# --- Notas Importantes ---
notes:
  # LOSS 13-15 ES NORMAL para Gemma 4 multimodal
  # NO es colapso del modelo, es un quirk de modelos multimodales
  # Si ves loss > 100, probablemente es un bug de gradient accumulation
  loss_normal_range: "13-15"
  
  # use_cache=True es CRÍTICO para E2B/E4B
  # Sin esto, el modelo produce garbage logits
  use_cache: true
  
  # VRAM estimado: ~8-10 GB con QLoRA 4-bit (r=16, all-linear, seq=1024)
  # RTX 5080 16GB es más que suficiente con esta configuración
  # Sin gradient_checkpointing + seq_length reducido = mucho más rápido
  vram_estimated: "8-10 GB"

# --- Inferencia (Post-Entrenamiento) ---
inference:
  generation:
    max_new_tokens: 512
    temperature: 1.0                    # Temperatura recomendada por Gemma
    top_p: 0.95                         # top_p recomendado por Gemma
    top_k: 64                           # top_k recomendado por Gemma
    do_sample: true
    use_cache: true  # CRÍTICO para E2B/E4B
  
  real_time_filter:
    enabled: true
    model: "guardrails"
    safety_model: "meta-llama/Llama-Guard-7b"

